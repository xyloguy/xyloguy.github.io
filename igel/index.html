<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Printed from IGEL</title>
    <style>
        @page {
            size: 8.5in 11in;
            margin: 0;
        }

        body {
            /* Applied font stack here */
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0 auto;
            padding: 1in;
            width: 6.5in;
            height: 9in;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 50px;
            color: #0A0A0A;
        }

        .print-label {
            font-size: 65px;
            font-weight: bold;
            margin-top: 0.5in;
            font-family: inherit; /* Ensures it uses the body font */
        }

        .name-input {
            font-family: inherit; /* Ensures it uses the body font */
            font-size: 80px;
            font-weight: bold;
            border: none;
            outline: none;
            text-align: center;
            width: 100%;
            background: transparent;
            color: #0A0A0A;
            resize: none;
            overflow: hidden;
        }

        .name-input::placeholder {
            color: #999;
            font-weight: normal;
        }

        .logo-container {
            width: 100%;
            max-width: 6in; 
            height: 350px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 50px;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* This ensures your Illustrator paths are visible and black */
        .st0 {
            fill: #0A0A0A !important;
        }

        .only-print{
            display: none;
        }

        .no-print {
            font-size: 40px;
            font-weight: bold;
            margin-top: 0;
            font-family: inherit; /* Ensures it uses the body font */
            display: block;
            color:#999;
        }

        @media print {
            .only-print{
                display: block;
            }
            .name-input {
                color: #bbb;
            }
            .name-input::placeholder {
                color: transparent;
            }
            .no-print {
                display: none;
            }
        }
    </style>
</head>
